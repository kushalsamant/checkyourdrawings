# Check Your Drawings API — Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: checkyourdrawings-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/ready
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: AUTH_REQUIRED
        value: "false"
      - key: COMPARE_MAX_RASTER_PIXELS
        value: "4000000"
      - key: COMPARE_MAX_WORKERS
        value: "1"
      - key: CORS_ORIGINS
        value: "https://checkyourdrawings.kvshvl.in,https://www.checkyourdrawings.kvshvl.in"
