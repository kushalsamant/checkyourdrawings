# Check Your Drawings API — Render Blueprint
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: checkyourdrawings-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: /app
      - key: CYD_AUTH_REQUIRED
        value: "false"
      - key: CYD_COMPARE_MAX_RASTER_PIXELS
        value: "4000000"
      - key: CYD_STORAGE_BYPASS
        value: "true"
      - key: CYD_CORS_ORIGINS
        value: "https://checkyourdrawings.kvshvl.in,https://www.checkyourdrawings.kvshvl.in"
