name: Supabase keep-alive

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST to reset 7-day inactivity timer
        env:
          SUPABASE_URL: https://ytcnzhapqainbtkoshvh.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "SUPABASE_ANON_KEY secret is not set" >&2
            exit 1
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/users?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY")
          echo "Supabase responded with HTTP $code"
          if [ "$code" -ge 500 ]; then
            echo "Unexpected server error from Supabase" >&2
            exit 1
          fi
